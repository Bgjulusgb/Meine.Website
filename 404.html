<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="robots" content="noindex, follow">
    <title>Seite nicht gefunden · Benjamin Gillmann Photography</title>
    <link rel="canonical" href="https://benni-photo.com/">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/assets/fonts.css">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{
            font-family:'Montserrat',sans-serif;background:#000;color:#fff;
            min-height:100svh;min-height:100vh;display:flex;align-items:center;justify-content:center;
            text-align:center;padding:2rem;line-height:1.6;
        }
        .wrap{max-width:520px}
        .code{font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.35em;text-transform:uppercase;color:#e0e0e0;margin-bottom:1.5rem}
        h1{font-family:'Cormorant Garamond',Georgia,serif;font-weight:300;font-size:clamp(3rem,14vw,6rem);line-height:1;margin-bottom:1rem}
        p{color:#f4f4f4;font-size:clamp(.9rem,2vw,1.05rem);margin-bottom:2.5rem}
        a.btn{
            display:inline-flex;align-items:center;gap:.5rem;background:#fff;color:#000;
            padding:1rem 2.2rem;font-size:.72rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;
            text-decoration:none;min-height:44px;transition:transform .3s ease,box-shadow .3s ease;
        }
        a.btn:hover{transform:translateY(-3px);box-shadow:0 15px 35px rgba(255,255,255,.15)}
    </style>
</head>
<body>
    <main class="wrap">
        <div class="code">Fehler 404</div>
        <h1>Seite nicht<br><em>gefunden</em></h1>
        <p>Diese Seite existiert nicht (mehr). Vielleicht findest du, was du suchst, auf der Startseite.</p>
        <a class="btn" href="/">Zur Startseite</a>
    </main>
</body>
</html>
