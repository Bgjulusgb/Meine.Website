name = "galerie-api"
main = "worker.js"
compatibility_date = "2024-10-01"

# ─── Frei zugängliche Variablen ──────────────────────────────────
[vars]
# Root-Ordner in Dropbox. Unterordner = je ein Kunde.
# Beispiel-Struktur in Dropbox:
#   /kundengalerien/lena/       → benni-photo.com/galerie/?client=lena
#   /kundengalerien/max/        → benni-photo.com/galerie/?client=max
#   /kundengalerien/            → benni-photo.com/galerie/  (ohne Subfolder)
DROPBOX_FOLDER  = "/kundengalerien"

# CORS: Welche Origins dürfen die API aufrufen (kommagetrennt)
ALLOWED_ORIGINS = "https://benni-photo.com,https://www.benni-photo.com,https://bgjulusgb.github.io"

# ─── Secrets (NIE hier eintragen!) ───────────────────────────────
# Setzen via Cloudflare Dashboard → Workers → galerie-api → Settings → Variables
# ODER via CLI:  wrangler secret put SECRET_NAME
#
# ── Empfohlen: OAuth2 Refresh-Token (läuft nie ab) ────────────────
#
#   Schritt 1: Dropbox Developer Console → https://www.dropbox.com/developers/apps
#              → App auswählen oder neu anlegen
#              → App key + App secret kopieren
#
#   Schritt 2: OAuth2 Authorization URL öffnen (APP_KEY einsetzen):
#              https://www.dropbox.com/oauth2/authorize?client_id=APP_KEY&response_type=code&token_access_type=offline
#
#   Schritt 3: Im Browser autorisieren → Code erhalten
#
#   Schritt 4: Code gegen Token tauschen (APP_KEY, APP_SECRET, CODE einsetzen):
#              curl -X POST https://api.dropbox.com/oauth2/token \
#                -u "APP_KEY:APP_SECRET" \
#                -d "code=CODE&grant_type=authorization_code"
#              → "refresh_token" in der Antwort = dein dauerhafter Token
#
#   Schritt 5: Als GitHub Secrets hinterlegen:
#              DROPBOX_REFRESH_TOKEN, DROPBOX_APP_KEY, DROPBOX_APP_SECRET
#
#   wrangler secret put DROPBOX_REFRESH_TOKEN
#   wrangler secret put DROPBOX_APP_KEY
#   wrangler secret put DROPBOX_APP_SECRET
#
# ── Fallback: Statischer Token (läuft nach ~4h ab) ───────────────
#
#   wrangler secret put DROPBOX_TOKEN
#   (Nur für Tests – in Produktion OAuth2 Refresh nutzen)
#
# ── Passwortschutz (optional) ────────────────────────────────────
#
#   GALLERY_PASSWORD_HASH  =  SHA-256("bg-gallery-salt-v1:PASSWORT") als Hex
#
#   Hash erzeugen (Browser-Konsole, F12):
#     const buf = await crypto.subtle.digest('SHA-256',
#       new TextEncoder().encode('bg-gallery-salt-v1:DEIN_PASSWORT'));
#     console.log([...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join(''));
#
#   Oder Bash:
#     printf 'bg-gallery-salt-v1:DEIN_PASSWORT' | sha256sum
#
#   wrangler secret put GALLERY_PASSWORD_HASH
