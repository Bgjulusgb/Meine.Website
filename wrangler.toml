name = "galerie-api"
main = "worker.js"
compatibility_date = "2024-10-01"

# ─── Frei zugängliche Variablen ──────────────────────────────────
[vars]
DROPBOX_FOLDER  = "/meine-fotos"
ALLOWED_ORIGINS = "https://benni-photo.com,https://www.benni-photo.com,https://bgjulusgb.github.io"

# ─── Secrets (NIE hier eintragen! Per Dashboard oder CLI setzen) ─
#
# ── Empfohlen: OAuth2 Refresh-Token (läuft nie ab) ──────────────
#
#   Dropbox Developer Console → Deine App → Settings → OAuth 2
#   1. "Generate" unter "Generated access token" → einmalig verwenden, um Refresh-Token zu erhalten
#      Besser: OAuth2 PKCE-Flow oder Offline-Access beantragen.
#
#   Secrets setzen:
#     wrangler secret put DROPBOX_REFRESH_TOKEN   # OAuth2 Refresh-Token
#     wrangler secret put DROPBOX_APP_KEY         # App-Key (Einstellungsseite)
#     wrangler secret put DROPBOX_APP_SECRET      # App-Secret (Einstellungsseite)
#
#   Oder via GitHub Actions Secrets:
#     DROPBOX_REFRESH_TOKEN, DROPBOX_APP_KEY, DROPBOX_APP_SECRET
#
# ── Fallback: Statischer Access-Token (läuft nach ~4h ab) ────────
#
#   wrangler secret put DROPBOX_TOKEN
#   (NICHT empfohlen für Produktion – Token muss regelmäßig erneuert werden)
#
# ── Passwortschutz (optional) ───────────────────────────────────
#
# GALLERY_PASSWORD_HASH
#   SHA-256 von "bg-gallery-salt-v1:DEIN_PASSWORT" als Hex-String.
#   Ohne dieses Secret ist die Galerie öffentlich zugänglich.
#
#   Hash erzeugen (im Browser-Konsole F12):
#     const SALT = 'bg-gallery-salt-v1';
#     const buf  = await crypto.subtle.digest('SHA-256',
#                    new TextEncoder().encode(`${SALT}:DEIN_PASSWORT`));
#     console.log([...new Uint8Array(buf)]
#       .map(b => b.toString(16).padStart(2,'0')).join(''));
#
#   Oder in Bash:
#     printf 'bg-gallery-salt-v1:DEIN_PASSWORT' | sha256sum
#
#   Setzen:
#     wrangler secret put GALLERY_PASSWORD_HASH
