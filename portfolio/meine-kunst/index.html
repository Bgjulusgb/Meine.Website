<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data:; media-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; font-src 'self' data:; connect-src 'self' https://cloudflareinsights.com; form-action 'self'; manifest-src 'self'; upgrade-insecure-requests">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="author" content="Benjamin Gillmann">
    <meta name="theme-color" content="#000000">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1">

    <!-- Titel/Beschreibung/Canonical/OG werden zusätzlich per JS kategoriespezifisch gesetzt. -->
    <title>Portfolio · Benjamin Gillmann Photography</title>
    <meta name="description" content="Fotografie-Portfolio von Benjamin Gillmann – Sport, Musik, Events, Red Carpet, Theater &amp; Musical und freie Kunst.">

    <link rel="icon" type="image/x-icon" href="../../favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="../../apple-touch-icon.png">
    <link rel="manifest" href="../../manifest.json">
    <link rel="stylesheet" href="../../assets/fonts.css">
    <link rel="stylesheet" href="../../assets/fontawesome/css/all.min.css">

    <link rel="stylesheet" href="../../assets/portfolio.css?v=20260617">
</head>
<body>

<!-- PRELOADER -->
<div class="preloader" id="preloader" role="status" aria-label="Galerie wird geladen">
    <div class="pl-scan" aria-hidden="true"></div>
    <div class="pl-body">
        <div class="pl-ring-wrap" aria-hidden="true">
            <div class="pl-ring"></div><div class="pl-ring"></div><div class="pl-ring"></div>
            <div class="pl-ring-prog" id="plRingProg" style="--p:0"></div>
            <div class="pl-logo-wrap"><img src="../../Transparent_Logo.svg" alt="" class="pl-logo"></div>
        </div>
        <div class="pl-name" id="plName">Portfolio</div>
        <div class="pl-sub">Benjamin Gillmann Photography</div>
        <div class="pl-bar-wrap">
            <div class="pl-bar-track"><div class="pl-bar-fill" id="plFill"></div></div>
            <div class="pl-bar-labels"><span>Galerie</span><span class="pl-counter" id="plCount">0%</span></div>
        </div>
    </div>
</div>

<div class="bg-fx" aria-hidden="true"></div>
<div class="scroll-progress" id="scrollProgress" aria-hidden="true"></div>
<div class="page-fade" id="pageFade" aria-hidden="true"></div>

<!-- HEADER -->
<header class="header" id="header" role="banner">
    <div class="nav-wrap">
        <a href="../../" class="logo" data-nav aria-label="Benjamin Gillmann Photography – Startseite">
            <img src="../../Transparent_Logo.svg" alt="Logo">
            <span class="logo-name">Benjamin Gillmann</span>
        </a>
        <nav><ul class="nav-links">
            <li><a href="../../#portfolio" class="nav-a" data-nav>Portfolio</a></li>
            <li><a href="../../#services" class="nav-a" data-nav>Leistungen</a></li>
            <li><a href="../../#contact" class="nav-a" data-nav>Kontakt</a></li>
        </ul></nav>
    </div>
</header>

<main id="main">
    <section class="g-intro">
        <div class="crumb" aria-label="Brotkrümel-Navigation">
            <a href="../../" data-nav>Start</a> <span aria-hidden="true">/</span>
            <a href="../../#portfolio" data-nav>Portfolio</a> <span aria-hidden="true">/</span>
            <span id="crumbCat" aria-current="page">Kategorie</span>
        </div>
        <h1 class="g-title reveal" id="gTitle">Portfolio</h1>
        <p class="g-desc reveal" id="gDesc"></p>
        <div class="g-count reveal" id="gCount" aria-live="polite"></div>
        <div class="g-note reveal" id="gNote" hidden></div>
    </section>

    <div class="photo-wall" id="gGrid" aria-busy="true" aria-label="Bildergalerie"></div>
    <p id="gEmpty" class="pf-empty" hidden>Galerie konnte nicht geladen werden.</p>
</main>

<!-- FOOTER -->
<footer class="footer" role="contentinfo">
    <div class="footer-inner">
        <span class="footer-copy">&copy; 2026 Benjamin Gillmann</span>
        <div class="footer-links">
            <a href="../../#portfolio" data-nav>Alle Portfolios</a>
            <a href="../../#contact" data-nav>Kontakt</a>
            <a href="../../impressum.html">Impressum</a>
            <a href="../../datenschutz.html">Datenschutz</a>
        </div>
    </div>
</footer>

<button class="back-top" id="backTop" aria-label="Zurück nach oben"><i class="fa-solid fa-arrow-up" aria-hidden="true"></i></button>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Bildansicht">
    <button id="lbClose" class="lb-close" aria-label="Schließen"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>
    <button id="lbPrev" class="lb-prev" aria-label="Vorheriges Bild"><i class="fa-solid fa-chevron-left" aria-hidden="true"></i></button>
    <button id="lbNext" class="lb-next" aria-label="Nächstes Bild"><i class="fa-solid fa-chevron-right" aria-hidden="true"></i></button>
    <div style="display:flex;flex-direction:column;align-items:center;max-width:100%;max-height:90dvh">
        <img id="lbImg" class="lb-img" src="" alt="Bildansicht">
        <div id="lbCap" class="lb-cap"></div>
    </div>
</div>

<script>
/* ── Kategorie-Metadaten (eine Datei für alle Portfolios) ── */
const CAT_META = {
    "sport":               {label:"Sport",            h:"Sport",                desc:"Dynamische Action- und Sportfotografie – von American Football bis Leichtathletik. Schnelle Reaktion, präzise Bildkomposition."},
    "konzert":             {label:"Musik",            h:"Konzert &amp; Musik",  desc:"Atmosphärische Konzert- und Musikfotografie, die Energie und Emotion einfängt – von kleinen Clubs bis zu großen Bühnen."},
    "event":               {label:"Events",           h:"Events",               desc:"Authentische Dokumentation von Veranstaltungen und besonderen Momenten."},
    "red-carpet":          {label:"Red Carpet",       h:"Red Carpet",           desc:"Red-Carpet- und Premieren-Fotografie."},
    "meine-kunst":         {label:"Meine Kunst",      h:"Meine Kunst",          desc:"Künstlerische Porträts und freie Arbeiten – unter anderem aus dem Ausstellungsprojekt »10 im Quadrat«.",
        note:'Die Porträtserie <strong>»10 im Quadrat«</strong> entstand für ein gemeinsames Ausstellungsprojekt junger Fotografen und Musiker in München – dokumentiert und veröffentlicht von der <a href="https://www.sueddeutsche.de/projekte/artikel/muenchen/10-im-quadrat-ausstellung-junge-fotografen-junge-musiker-portraets-e331356/" target="_blank" rel="noopener noreferrer">Süddeutschen Zeitung</a>.'},
    "theater-und-musical": {label:"Theater &amp; Musical", h:"Theater &amp; Musical", desc:"Bühnenfotografie aus Theater, Musical und Show – Licht, Bewegung und Ausdruck."}
};

/* Kategorie aus dem Pfad ableiten: /portfolio/<cat>/ */
function detectCat(){
    const parts = location.pathname.split('/').filter(Boolean);
    const i = parts.lastIndexOf('portfolio');
    let cat = (i >= 0 && parts[i+1]) ? parts[i+1] : parts[parts.length-1];
    if(cat && cat.endsWith('.html')) cat = parts[parts.length-2] || '';
    return decodeURIComponent(cat || '');
}
const CAT = detectCat();
const META = CAT_META[CAT] || {label:"Portfolio", h:"Portfolio", desc:"Ausgewählte Arbeiten von Benjamin Gillmann."};
const plain = s => String(s).replace(/&amp;/g,'&');

/* ── Head/SEO kategoriespezifisch setzen ── */
(function(){
    const labelPlain = plain(META.h);
    document.title = labelPlain + ' Portfolio · Benjamin Gillmann Photography';
    const descTxt = META.desc;
    function meta(sel, attr, val){ let el=document.querySelector(sel); if(el) el.setAttribute(attr,val); }
    meta('meta[name="description"]','content',descTxt);
    const canon = 'https://benni-photo.com/portfolio/' + encodeURIComponent(CAT) + '/';
    let link=document.querySelector('link[rel="canonical"]');
    if(!link){ link=document.createElement('link'); link.rel='canonical'; document.head.appendChild(link); }
    link.href = canon;
    // Open Graph
    [['og:type','website'],['og:title',labelPlain+' · Benjamin Gillmann Photography'],
     ['og:description',descTxt],['og:url',canon],['og:locale','de_DE']].forEach(([p,c])=>{
        let m=document.createElement('meta'); m.setAttribute('property',p); m.content=c; document.head.appendChild(m);
    });
    // Sichtbare Texte
    document.getElementById('plName').innerHTML = META.h;
    document.getElementById('gTitle').innerHTML = META.h;
    document.getElementById('gDesc').textContent = descTxt;
    document.getElementById('crumbCat').textContent = labelPlain;
    if(META.note){ const n=document.getElementById('gNote'); n.innerHTML = META.note; n.hidden = false; }
    // Nav-Active-State auf "Portfolio"-Link im Header
    const navPortfolio = document.querySelector('header .nav-links a[href="../../#portfolio"]');
    if (navPortfolio) {
        navPortfolio.setAttribute('aria-current', 'page');
        navPortfolio.classList.add('is-active');
    }
    // JSON-LD BreadcrumbList für Google-SERP
    try {
        const bc = {
            "@context": "https://schema.org",
            "@type": "BreadcrumbList",
            "itemListElement": [
                {"@type":"ListItem","position":1,"name":"Start","item":"https://benni-photo.com/"},
                {"@type":"ListItem","position":2,"name":"Portfolio","item":"https://benni-photo.com/#portfolio"},
                {"@type":"ListItem","position":3,"name":labelPlain,"item":canon}
            ]
        };
        const s = document.createElement('script');
        s.type = 'application/ld+json';
        s.textContent = JSON.stringify(bc);
        document.head.appendChild(s);
    } catch(e) {}
})();

/* ── PRELOADER (echter Ladefortschritt, sanft interpoliert) ── */
(function(){
    const pl=document.getElementById('preloader'); if(!pl) return;
    const fill=document.getElementById('plFill'), count=document.getElementById('plCount'), ring=document.getElementById('plRingProg');
    const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
    const MIN_MS=400; const t0=performance.now();
    let cur=0, done=false, raf=0, loaded=false;
    const apply=p=>{ const v=Math.min(100,Math.max(0,p)); if(fill)fill.style.width=v+'%'; if(count)count.textContent=Math.round(v)+'%'; if(ring)ring.style.setProperty('--p',v.toFixed(1)); };
    function finish(){
        if(done) return; done=true; cancelAnimationFrame(raf);
        const seal=()=>{ apply(100); pl.classList.add('exit'); setTimeout(()=>{pl.style.display='none';},760); };
        if(reduce){ seal(); return; }
        (function close(){ cur+=(100-cur)*0.3+0.8; if(cur>=99.5){seal();} else {apply(cur); raf=requestAnimationFrame(close);} })();
    }
    const markLoaded=()=>{ loaded=true; }; window._pfReady=markLoaded;
    if(document.readyState==='complete') markLoaded(); else window.addEventListener('load',markLoaded);
    if(reduce){ apply(100); const fin=()=>setTimeout(finish,Math.max(0,MIN_MS-(performance.now()-t0))); if(loaded)fin(); else window.addEventListener('load',fin); return; }
    (function tick(){ if(done) return; const elapsed=performance.now()-t0; const timeP=Math.min(100,(elapsed/MIN_MS)*100); const target=loaded?timeP:Math.min(timeP,92); cur+=(target-cur)*0.14; apply(cur); if(loaded&&elapsed>=MIN_MS){finish();return;} raf=requestAnimationFrame(tick); })();
    setTimeout(()=>{ loaded=true; finish(); },6000);
})();

/* ── STICKY HEADER + SCROLL-FORTSCHRITT ── */
(function(){
    const header=document.getElementById('header'), prog=document.getElementById('scrollProgress'), bt=document.getElementById('backTop');
    let ticking=false;
    function update(){
        const y=window.scrollY||0;
        header.classList.toggle('stuck',y>40);
        bt.classList.toggle('show',y>400);
        const docH=document.documentElement.scrollHeight-window.innerHeight;
        if(prog) prog.style.transform='scaleX('+(docH>0?Math.min(Math.max(y/docH,0),1):0)+')';
        ticking=false;
    }
    window.addEventListener('scroll',()=>{if(!ticking){ticking=true;requestAnimationFrame(update);}},{passive:true});
    document.getElementById('backTop').addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
    update();
})();

/* ── SEITENÜBERGANG (Fade beim Verlassen) ── */
(function(){
    const fade=document.getElementById('pageFade');
    const reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
    if(!fade) return;
    window.addEventListener('pageshow',()=>fade.classList.remove('on'));
    if(reduce) return;
    document.addEventListener('click',e=>{
        const a=e.target.closest('a[data-nav]');
        if(!a) return;
        const href=a.getAttribute('href');
        if(!href||href.startsWith('#')||href.startsWith('http')||a.target==='_blank') return;
        e.preventDefault();
        fade.classList.add('on');
        setTimeout(()=>{location.href=href;},420);
    });
})();

/* ── REVEAL ── */
const revObs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in-view');revObs.unobserve(e.target);}});},{threshold:.08,rootMargin:'0px 0px -40px 0px'});
document.querySelectorAll('.reveal').forEach(el=>revObs.observe(el));

/* ── LIGHTBOX ── */
const grid=document.getElementById('gGrid'), gEmpty=document.getElementById('gEmpty');
const lb=document.getElementById('lightbox'), lbImg=document.getElementById('lbImg'), lbCap=document.getElementById('lbCap');
let lbIdx=-1, lbItems=[];
const items=()=>[...grid.querySelectorAll('.pf-item')];
function openLB(src,title,idx){ lbImg.src=src; lbCap.textContent=title; lb.classList.add('on'); document.body.classList.add('no-scroll'); lbIdx=idx; lbItems=items(); document.getElementById('lbClose').focus(); }
function closeLB(){ lb.classList.remove('on'); document.body.classList.remove('no-scroll'); }
function navLB(d){ if(!lbItems.length) return; lbIdx=(lbIdx+d+lbItems.length)%lbItems.length; const it=lbItems[lbIdx]; openLB(it.dataset.src,it.dataset.title,lbIdx); }
document.getElementById('lbClose').addEventListener('click',closeLB);
document.getElementById('lbPrev').addEventListener('click',()=>navLB(-1));
document.getElementById('lbNext').addEventListener('click',()=>navLB(1));
lb.addEventListener('click',e=>{if(e.target===lb) closeLB();});
document.addEventListener('keydown',e=>{ if(!lb.classList.contains('on')) return; if(e.key==='Escape')closeLB(); if(e.key==='ArrowLeft')navLB(-1); if(e.key==='ArrowRight')navLB(1); });
let tsX=0;
lb.addEventListener('touchstart',e=>{tsX=e.changedTouches[0].clientX;},{passive:true});
lb.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tsX; if(Math.abs(dx)>50) navLB(dx<0?1:-1);},{passive:true});

const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function render(list){
    // Randomizer: Bilder bei jedem Laden in zufälliger Reihenfolge anzeigen
    list=list.slice();
    for(let i=list.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[list[i],list[j]]=[list[j],list[i]];}
    grid.innerHTML=list.map((it,i)=>{
        const fullSrc=encodeURI(it.file);
        const thumbSrc=it.thumb?encodeURI(it.thumb):fullSrc;
        const alt=esc(it.alt||it.title||'');
        const title=esc(it.title||'');
        const tw=it.tw||it.width, th=it.th||it.height;
        const dim=(tw&&th)?` width="${tw}" height="${th}"`:''
        const eager=i<4?` loading="eager" fetchpriority="high"`:` loading="lazy"`;
        return `<div class="pf-item" tabindex="0" role="button" aria-label="${alt} – vergrößern" data-src="${fullSrc}" data-title="${title}">
    <img src="${thumbSrc}" alt="${alt}"${dim}${eager} decoding="async">
    <div class="pf-overlay" aria-hidden="true"></div>
    <div class="pf-info"><div class="pf-title">${title}</div></div>
    <div class="pf-zoom" aria-hidden="true"><i class="fa-solid fa-plus"></i></div>
</div>`;
    }).join('');
    grid.removeAttribute('aria-busy');
    window._pfReady?.();
    grid.querySelectorAll('.pf-item img').forEach(img=>{
        const mark=()=>{ img.classList.add('loaded'); img.parentElement.classList.add('loaded-wrap'); };
        if(img.complete && img.naturalWidth) mark();
        else { img.addEventListener('load',mark,{once:true}); img.addEventListener('error',()=>img.parentElement.classList.add('loaded-wrap'),{once:true}); }
    });
    items().forEach(item=>{
        item.addEventListener('click',()=>{ lbItems=items(); openLB(item.dataset.src,item.dataset.title,lbItems.indexOf(item)); });
        item.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); item.click(); } });
    });
    document.getElementById('gCount').textContent = list.length + (list.length===1?' Bild':' Bilder');
    // JSON-LD ImageGallery
    try{
        const ld={ "@context":"https://schema.org","@type":"ImageGallery",
            "name":plain(META.h)+" – Benjamin Gillmann Photography",
            "url":"https://benni-photo.com/portfolio/"+encodeURIComponent(CAT)+"/",
            "author":{"@type":"Person","name":"Benjamin Gillmann"},
            "image":list.slice(0,30).map(it=>"https://benni-photo.com/portfolio/"+encodeURIComponent(CAT)+"/"+encodeURI(it.file)) };
        const s=document.createElement('script'); s.type='application/ld+json'; s.textContent=JSON.stringify(ld); document.head.appendChild(s);
    }catch(e){}
    // og:image / twitter:image aus dem ersten Bild der Kategorie
    if (list.length > 0) {
        const firstImg = "https://benni-photo.com/portfolio/" + encodeURIComponent(CAT) + "/" + encodeURI(list[0].file);
        const firstAlt = plain(META.h) + ' – ' + (list[0].title || list[0].alt || '');
        [['og:image', firstImg], ['og:image:alt', firstAlt]].forEach(([p, c]) => {
            let m = document.createElement('meta');
            m.setAttribute('property', p);
            m.content = c;
            document.head.appendChild(m);
        });
        [['twitter:card', 'summary_large_image'], ['twitter:image', firstImg]].forEach(([n, c]) => {
            let m = document.createElement('meta');
            m.setAttribute('name', n);
            m.content = c;
            document.head.appendChild(m);
        });
    }
}

fetch('./images.json')
    .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(list=>{ if(!Array.isArray(list)||!list.length) throw new Error('leer'); render(list); })
    .catch(()=>{ grid.removeAttribute('aria-busy'); if(gEmpty) gEmpty.hidden=false; document.getElementById('gCount').textContent=''; });
</script>
</body>
</html>
