name: 🚀 Deploy Galerie (Frontend)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy_frontend:
    name: Frontend zu GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: ⬇️ Code auschecken
        uses: actions/checkout@v4

      - name: 🟢 Node.js Setup
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔧 Worker-URL in index.html eintragen
        run: |
          ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          WORKER_URL="https://galerie-api.${ACCOUNT_ID}.workers.dev"
          sed -i "s|'__WORKER_URL__'|'${WORKER_URL}'|g" index.html
          echo "✅ Worker-URL: ${WORKER_URL}"

      - name: 📤 Artifact hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🌐 Zu GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v2
