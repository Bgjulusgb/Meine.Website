name: 🚀 Deploy Galerie (Worker + Frontend)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy_worker:
    name: 1️⃣ Worker zu Cloudflare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install -g wrangler

      - name: 🔐 Dropbox-Token setzen
        run: |
          echo "${{ secrets.DROPBOX_ACCESS_TOKEN }}" > /tmp/token.txt
          wrangler secret put DROPBOX_TOKEN < /tmp/token.txt
          rm /tmp/token.txt
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 🚀 Worker deployen
        run: wrangler deploy worker.js --name galerie-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy_frontend:
    name: 2️⃣ Frontend zu GitHub Pages
    runs-on: ubuntu-latest
    needs: deploy_worker  # ← WICHTIG: Wartet auf Worker-Deploy
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔧 Worker-URL eintragen
        run: |
          ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          WORKER_URL="https://galerie-api.${ACCOUNT_ID}.workers.dev"
          sed -i "s|'__WORKER_URL__'|'${WORKER_URL}'|g" index.html
          echo "✅ Worker-URL: ${WORKER_URL}"

      - name: 📤 Upload zu Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🌐 Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v2
