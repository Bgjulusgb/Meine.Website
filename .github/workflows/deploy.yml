name: 🚀 Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🔧 Worker-URL eintragen
        run: |
          WORKER_URL="https://galerie-api.3d95dac45e5dd7bcba40e06cc22cbccb.workers.dev"
          sed -i "s|'__WORKER_URL__'|'${WORKER_URL}'|g" index.html

      - name: 📤 Push zu GitHub Pages Branch
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "Auto: Worker-URL aktualisiert"
          git push origin main
