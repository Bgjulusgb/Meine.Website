name: Blog bauen

# Läuft bei jeder Änderung im blog/-Ordner (neuer/aktualisierter Beitrag),
# am Build-Skript oder an den Templates. Erzeugt aus den index.md-Quellen die
# fertigen index.html-Seiten, blog/index.html, posts.json, feed.xml und
# blog/sitemap.xml und committet sie zurück. Commits mit GITHUB_TOKEN lösen
# KEINE neuen Workflows aus -> keine Endlosschleife. GitHub Pages deployt danach.

on:
  push:
    paths:
      - "blog/**"
      - "scripts/build_blog.py"
      - "scripts/templates/**"
      - ".github/workflows/blog.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: blog-manifest
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install Pillow markdown pyyaml

      - name: Blog erzeugen
        run: python scripts/build_blog.py blog .

      - name: Änderungen committen (falls vorhanden)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog/
          if git diff --staged --quiet; then
            echo "Keine Änderungen – nichts zu committen."
          else
            git commit -m "chore: Blog automatisch neu gebaut"
            git push
          fi
